services:
  db:
    image: postgres:16-alpine
    container_name: ops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_processing
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d order_processing']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ops-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://postgres:postgres@db:5432/order_processing?schema=public
      SCHEDULER_CRON: '*/5 * * * *'
      SCHEDULER_ENABLED: 'true'
    ports:
      - '3000:3000'

volumes:
  postgres_data:
